services:
  app:
    build:
      context: .
      target: runtime
    image: agentic-contact-center:local
    ports:
      - "8026:8026"
    environment:
      PORT: "8026"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8026/health').then(async (response)=>{if(!response.ok)process.exit(1);const contentType=response.headers.get('content-type')||'';if(!contentType.toLowerCase().includes('application/json'))return;const payload=await response.json().catch(()=>null);if(payload&&typeof payload==='object'&&'ok' in payload&&payload.ok!==true)process.exit(1);}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  proof:
    build:
      context: .
      target: runtime
    image: agentic-contact-center:local
    profiles: ["proof"]
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command:
      - node
      - scripts/demo-proof.mjs
      - --out
      - artifacts/demo-proof-docker.json
      - --latest-out
      - artifacts/demo-proof-latest.json
    volumes:
      - ./artifacts:/app/artifacts

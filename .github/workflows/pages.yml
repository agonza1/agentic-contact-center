name: Deploy ClueCon Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Keep production deploys isolated from PR validation. GitHub only retains one
# pending run per concurrency group, so sharing `pages` allowed busy PR traffic
# to replace a queued deployment from main.
concurrency:
  group: pages-${{ github.event_name == 'pull_request' && github.ref || 'production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Export ClueCon static pages
        run: npm run pages:cluecon
      - name: Validate Pages export
        run: |
          test -s site/cluecon-pages/index.html
          test -s site/cluecon-pages/present/index.html
          test -s site/cluecon-pages/404.html
          test -f site/cluecon-pages/.nojekyll
      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/cluecon-pages
  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
